      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#supraGrad)"/>
  
  <!-- Силуэт Toyota Supra -->
  <path d="M 150 450 L 200 420 L 300 400 L 450 380 L 600 370 L 750 380 L 900 400 L 1000 430 L 1050 450 L 1050 500 L 1000 500 L 980 470 L 950 470 L 930 500 L 850 500 L 830 470 L 750 470 L 730 500 L 650 500 L 630 470 L 550 470 L 530 500 L 450 500 L 430 470 L 350 470 L 330 500 L 250 500 L 230 470 L 150 470 Z" 
