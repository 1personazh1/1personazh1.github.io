<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="tuningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#tuningGrad)"/>
  
  <!-- Турбокомпрессор схема -->
  <circle cx="400" cy="350" r="80" fill="none" stroke="#ff3366" stroke-width="8"/>
  <circle cx="400" cy="350" r="40" fill="#0a0a0f" stroke="#ff3366" stroke-width="4"/>
  <path d="M 400 270 L 400 200 L 500 200 L 500 250" fill="none" stroke="#00f0ff" stroke-width="6"/>
  <path d="M 400 430 L 400 500 L 300 500 L 300 450" fill="none" stroke="#00f0ff" stroke-width="6"/>
  
  <!-- Интеркулер -->
  <rect x="600" y="300" width="200" height="100" fill="#0a0a0f" stroke="#00f0ff" stroke-width="4"/>
  <line x1="620" y1="320" x2="780" y2="320" stroke="#00f0ff" stroke-width="2"/>
  <line x1="620" y1="340" x2="780" y2="340" stroke="#00f0ff" stroke-width="2"/>
  <line x1="620" y1="360" x2="780" y2="360" stroke="#00f0ff" stroke-width="2"/>
  <line x1="620" y1="380" x2="780" y2="380" stroke="#00f0ff" stroke-width="2"/>
  
  <!-- Впускной коллектор -->
  <path d="M 800 350 L 900 350 L 950 320 L 950 380 Z" fill="#ff3366" opacity="0.8"/>
  
  <!-- Текст -->
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ff3366" text-anchor="middle">ENGINE TUNING</text>
  <text x="600" y="190" font-family="Arial, sans-serif" font-size="24" fill="#f0f0f0" text-anchor="middle">TURBO • INTERCOOLER • PERFORMANCE</text>
  
  <!-- Характеристики -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#f0f0f0">
    <text x="400" y="550" text-anchor="middle">TURBO</text>
    <text x="700" y="550" text-anchor="middle">INTERCOOLER</text>
    <text x="900" y="550" text-anchor="middle">INTAKE</text>
  </g>
  
  <!-- Декоративные элементы -->
  <line x1="200" y1="600" x2="1000" y2="600" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <text x="600" y="630" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">JDM CULTURE BLOG</text>
</svg>
