<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="skylineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#skylineGrad)"/>
  
  <!-- Силуэт Nissan Skyline R32 -->
  <path d="M 100 450 L 150 420 L 200 400 L 350 380 L 500 370 L 650 380 L 800 400 L 900 430 L 950 450 L 950 500 L 900 500 L 880 470 L 850 470 L 830 500 L 750 500 L 730 470 L 650 470 L 630 500 L 550 500 L 530 470 L 450 470 L 430 500 L 350 500 L 330 470 L 250 470 L 230 500 L 150 500 L 130 470 L 100 470 Z" 
        fill="#ff3366" opacity="0.8"/>
  
  <!-- Колеса -->
  <circle cx="300" cy="500" r="40" fill="#0a0a0f" stroke="#ff3366" stroke-width="3"/>
  <circle cx="700" cy="500" r="40" fill="#0a0a0f" stroke="#ff3366" stroke-width="3"/>
  
  <!-- Фары -->
  <ellipse cx="180" cy="440" rx="15" ry="10" fill="#00f0ff"/>
  <ellipse cx="920" cy="440" rx="15" ry="10" fill="#00f0ff"/>
  
  <!-- Текст -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ff3366" text-anchor="middle">NISSAN SKYLINE GT-R</text>
  <text x="600" y="340" font-family="Arial, sans-serif" font-size="24" fill="#f0f0f0" text-anchor="middle">R32 GODZILLA 1990</text>
  
  <!-- Декоративные элементы -->
  <line x1="200" y1="600" x2="1000" y2="600" stroke="#ff3366" stroke-width="2" opacity="0.5"/>
  <text x="600" y="630" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">JDM CULTURE BLOG</text>
</svg>
