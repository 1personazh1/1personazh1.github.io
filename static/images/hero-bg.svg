<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="tokyoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a1a3e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#tokyoGrad)"/>
  
  <!-- Tokyo highway silhouette -->
  <path d="M 0 550 L 100 500 L 200 520 L 300 480 L 400 510 L 500 470 L 600 500 L 700 460 L 800 490 L 900 450 L 1000 480 L 1100 440 L 1200 470 L 1200 675 L 0 675 Z" 
        fill="#0a0a0f" opacity="0.8"/>
  
  <!-- Небоскребы -->
  <rect x="50" y="300" width="80" height="250" fill="#16213e" opacity="0.9"/>
  <rect x="150" y="250" width="100" height="300" fill="#16213e" opacity="0.9"/>
  <rect x="280" y="280" width="70" height="270" fill="#16213e" opacity="0.9"/>
  <rect x="380" y="200" width="120" height="350" fill="#16213e" opacity="0.9"/>
  <rect x="530" y="230" width="90" height="320" fill="#16213e" opacity="0.9"/>
  <rect x="650" y="180" width="110" height="370" fill="#16213e" opacity="0.9"/>
  <rect x="790" y="260" width="80" height="290" fill="#16213e" opacity="0.9"/>
  <rect x="900" y="220" width="100" height="330" fill="#16213e" opacity="0.9"/>
  <rect x="1030" y="280" width="90" height="270" fill="#16213e" opacity="0.9"/>
  <rect x="1140" y="240" width="60" height="310" fill="#16213e" opacity="0.9"/>
  
  <!-- Neon огни -->
  <g fill="#ff3366" opacity="0.8">
    <rect x="70" y="320" width="10" height="10"/>
    <rect x="100" y="320" width="10" height="10"/>
    <rect x="70" y="350" width="10" height="10"/>
    <rect x="100" y="350" width="10" height="10"/>
    <rect x="170" y="280" width="10" height="10"/>
    <rect x="200" y="280" width="10" height="10"/>
    <rect x="170" y="310" width="10" height="10"/>
    <rect x="400" y="230" width="10" height="10"/>
    <rect x="430" y="230" width="10" height="10"/>
    <rect x="460" y="230" width="10" height="10"/>
    <rect x="670" y="210" width="10" height="10"/>
    <rect x="700" y="210" width="10" height="10"/>
    <rect x="920" y="250" width="10" height="10"/>
    <rect x="950" y="250" width="10" height="10"/>
  </g>
  
  <!-- Свет фар на шоссе -->
  <ellipse cx="300" cy="500" rx="30" ry="10" fill="#00f0ff" opacity="0.6"/>
  <ellipse cx="500" cy="480" rx="30" ry="10" fill="#00f0ff" opacity="0.6"/>
  <ellipse cx="700" cy="470" rx="30" ry="10" fill="#ff3366" opacity="0.6"/>
  <ellipse cx="900" cy="460" rx="30" ry="10" fill="#ff3366" opacity="0.6"/>
  
  <!-- Текст -->
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ff3366" text-anchor="middle">TOKYO HIGHWAY</text>
  <text x="600" y="170" font-family="Arial, sans-serif" font-size="24" fill="#f0f0f0" text-anchor="middle">NEON NIGHT DRIVE</text>
  
  <!-- Декоративные элементы -->
  <line x1="200" y1="600" x2="1000" y2="600" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <text x="600" y="630" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">JDM CULTURE BLOG</text>
</svg>
