<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#331111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#heroGrad)"/>
  
  <!-- Ретро сетка -->
  <g stroke="#ff3333" stroke-width="1" opacity="0.2">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>
  
  <!-- Диагональные полосы -->
  <line x1="0" y1="0" x2="600" y2="600" stroke="#ff3333" stroke-width="3" opacity="0.4"/>
  <line x1="600" y1="0" x2="1200" y2="600" stroke="#ff3333" stroke-width="3" opacity="0.4"/>
  
  <!-- Текст -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ff3333" text-anchor="middle" letter-spacing="5">JDM</text>
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="36" fill="#f0f0f0" text-anchor="middle" letter-spacing="10">CULTURE</text>
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="18" fill="#888" text-anchor="middle">Japanese Domestic Market Blog</text>
  
  <!-- Декоративные элементы -->
  <rect x="50" y="50" width="100" height="3" fill="#ff3333"/>
  <rect x="1050" y="50" width="100" height="3" fill="#ff3333"/>
  <rect x="50" y="547" width="100" height="3" fill="#ff3333"/>
  <rect x="1050" y="547" width="100" height="3" fill="#ff3333"/>
</svg>
