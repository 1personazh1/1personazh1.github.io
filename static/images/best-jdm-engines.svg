<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="enginesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#enginesGrad)"/>
  
  <!-- 2JZ-GTE (слева) -->
  <g transform="translate(150, 250)">
    <rect x="0" y="0" width="280" height="180" fill="#0a0a0f" stroke="#ff3366" stroke-width="3"/>
    <rect x="20" y="20" width="240" height="40" fill="#1a1a2e" stroke="#ff3366" stroke-width="2"/>
    <rect x="20" y="70" width="240" height="40" fill="#1a1a2e" stroke="#ff3366" stroke-width="2"/>
    <rect x="20" y="120" width="240" height="40" fill="#1a1a2e" stroke="#ff3366" stroke-width="2"/>
    <circle cx="140" cy="90" r="30" fill="#ff3366" opacity="0.5"/>
    <text x="140" y="160" font-family="Arial" font-size="20" fill="#ff3366" text-anchor="middle">2JZ-GTE</text>
  </g>
  
  <!-- RB26DETT (центр) -->
  <g transform="translate(460, 250)">
    <rect x="0" y="0" width="280" height="180" fill="#0a0a0f" stroke="#00f0ff" stroke-width="3"/>
    <rect x="20" y="20" width="240" height="40" fill="#1a1a2e" stroke="#00f0ff" stroke-width="2"/>
    <rect x="20" y="70" width="240" height="40" fill="#1a1a2e" stroke="#00f0ff" stroke-width="2"/>
    <rect x="20" y="120" width="240" height="40" fill="#1a1a2e" stroke="#00f0ff" stroke-width="2"/>
    <circle cx="140" cy="90" r="30" fill="#00f0ff" opacity="0.5"/>
    <text x="140" y="160" font-family="Arial" font-size="20" fill="#00f0ff" text-anchor="middle">RB26DETT</text>
  </g>
  
  <!-- K20 VTEC (справа) -->
  <g transform="translate(770, 250)">
    <rect x="0" y="0" width="280" height="180" fill="#0a0a0f" stroke="#7b2cbf" stroke-width="3"/>
    <rect x="20" y="20" width="240" height="40" fill="#1a1a2e" stroke="#7b2cbf" stroke-width="2"/>
    <rect x="20" y="70" width="240" height="40" fill="#1a1a2e" stroke="#7b2cbf" stroke-width="2"/>
    <rect x="20" y="120" width="240" height="40" fill="#1a1a2e" stroke="#7b2cbf" stroke-width="2"/>
    <circle cx="140" cy="90" r="30" fill="#7b2cbf" opacity="0.5"/>
    <text x="140" y="160" font-family="Arial" font-size="20" fill="#7b2cbf" text-anchor="middle">K20 VTEC</text>
  </g>
  
  <!-- Заголовок -->
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ff3366" text-anchor="middle">LEGENDARY JDM ENGINES</text>
  
  <!-- Характеристики -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#f0f0f0">
    <text x="290" y="480" text-anchor="middle">3.0L I6 Twin-Turbo</text>
    <text x="600" y="480" text-anchor="middle">2.6L I6 Twin-Turbo</text>
    <text x="910" y="480" text-anchor="middle">2.0L I4 VTEC</text>
    <text x="290" y="510" text-anchor="middle">1000+ HP Potential</text>
    <text x="600" y="510" text-anchor="middle">800+ HP Potential</text>
    <text x="910" y="510" text-anchor="middle">500+ HP Potential</text>
  </g>
  
  <!-- Декоративные элементы -->
  <line x1="200" y1="600" x2="1000" y2="600" stroke="#ff3366" stroke-width="2" opacity="0.5"/>
  <text x="600" y="630" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">JDM CULTURE BLOG</text>
</svg>
