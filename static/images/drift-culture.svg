<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="driftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#driftGrad)"/>
  
  <!-- Горы (touge) -->
  <path d="M 0 500 L 200 350 L 400 450 L 600 300 L 800 400 L 1000 350 L 1200 450 L 1200 675 L 0 675 Z" fill="#0a0a0f" opacity="0.5"/>
  
  <!-- Дрифт машина -->
  <path d="M 300 480 L 350 450 L 450 430 L 600 420 L 750 430 L 850 450 L 900 480 L 900 520 L 850 520 L 830 490 L 800 490 L 780 520 L 700 520 L 680 490 L 600 490 L 580 520 L 500 520 L 480 490 L 400 490 L 380 520 L 300 520 Z" 
        fill="#ff3366" opacity="0.9" transform="rotate(-15 600 480)"/>
  
  <!-- Дым от шин -->
  <circle cx="400" cy="520" r="30" fill="#888" opacity="0.5"/>
  <circle cx="450" cy="530" r="40" fill="#888" opacity="0.4"/>
  <circle cx="500" cy="540" r="50" fill="#888" opacity="0.3"/>
  
  <!-- Колеса -->
  <circle cx="480" cy="500" r="35" fill="#0a0a0f" stroke="#ff3366" stroke-width="3" transform="rotate(-15 480 500)"/>
  <circle cx="750" cy="500" r="35" fill="#0a0a0f" stroke="#ff3366" stroke-width="3" transform="rotate(-15 750 500)"/>
  
  <!-- Текст -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ff3366" text-anchor="middle">TOUGE DRIFT</text>
  <text x="600" y="290" font-family="Arial, sans-serif" font-size="24" fill="#f0f0f0" text-anchor="middle">JAPANESE MOUNTAIN PASS CULTURE</text>
  
  <!-- Декоративные элементы -->
  <line x1="200" y1="600" x2="1000" y2="600" stroke="#ff3366" stroke-width="2" opacity="0.5"/>
  <text x="600" y="630" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">JDM CULTURE BLOG</text>
</svg>
